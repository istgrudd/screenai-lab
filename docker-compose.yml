# ScreenAI Lab — Docker Compose for self-hosted VPS deployment.
#
# Architecture: a single VPS runs three containers behind a host-level
# reverse proxy (Nginx/Caddy running OUTSIDE Docker, which terminates TLS
# and forwards plain HTTP to the frontend container on port 80).
#
#   browser --HTTPS--> host nginx/caddy --HTTP--> frontend (nginx)
#                                              \--/api/--> backend (uvicorn) --> db (postgres)
#
# All three services read the project-root .env. See docs/DEPLOYMENT.md
# for the full first-deploy walkthrough.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # W5: gate dependents on real readiness, not just "container started".
    # ``$$`` escapes so the container shell expands the vars (set above), not
    # docker compose at parse time.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Port intentionally NOT published — Postgres is reachable only on the
    # compose network as `db:5432`, never from the public internet.

  backend:
    build:
      # Context is the repo root so the Dockerfile can see requirements.txt,
      # alembic.ini, and the backend/ package together.
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    # W5: cap container memory so a runaway can't take the whole VPS down. The
    # resident set is dominated by the ~1.3 GB IndoBERT model plus PyTorch and
    # the app; 3g leaves headroom for the load spike and request handling. Tune
    # per VPS via BACKEND_MEM_LIMIT (keep it comfortably above ~2 GB).
    mem_limit: ${BACKEND_MEM_LIMIT:-3g}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # SQLite dev DB (unused in prod), legacy raw_pdfs/extracted/anonymized
      # artifacts — all default to ./data/* in backend/config.py.
      - ./data:/app/data
      # Candidate-submitted application documents. backend/config.py defaults
      # settings.upload_dir to ./uploads, which resolves to /app/uploads inside
      # the container, so this mount makes uploads survive container recreation.
      - ./uploads:/app/uploads
      # Per-period archive output. scripts/archive_period.py defaults
      # --output-dir to ./archive -> /app/archive inside the container, so the
      # canonical in-container run
      #   docker compose exec backend python -m scripts.archive_period \
      #       --period-id <ID> --dump-mode local
      # lands the {id}_{slug} archive folder here on the host, where it survives
      # container recreation. The backend image declares no non-root USER, so the
      # container's root can write this bind mount with no chown. Contains
      # candidate PII + full-DB dumps and is gitignored (/archive/).
      - ./archive:/app/archive
      # NOTE: the IndoBERT NER model is pre-baked into the image (W5) at
      # /app/models/ner, so there is deliberately NO ./models bind mount here —
      # a bind mount would shadow the baked-in model with an (empty) host dir
      # and force a fresh ~1.3 GB download on boot. Rebuild the image to update
      # the model.
    # W5: container-level health so docker (and dependents) can tell when the
    # API is actually serving. The slim image has no curl/wget, so probe with
    # stdlib urllib. start_period covers boot migrations + rubric seeding; the
    # NER warmup runs in a background thread and does not gate /api/health.
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health', timeout=4).status==200 else 1)"
      interval: 30s
      timeout: 6s
      retries: 3
      start_period: 40s
    # Port intentionally NOT published — the frontend nginx reaches the
    # backend on the internal compose network as `backend:8000`.

  frontend:
    build:
      context: ./frontend
      args:
        # Vite inlines VITE_API_BASE_URL at build time, so this must come
        # from the .env at docker compose build, NOT at container start.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    restart: unless-stopped
    # W5: don't start serving the SPA until the backend is healthy, so the
    # first /api proxy hit doesn't race the backend's boot.
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    # Port 443 / TLS is handled by the host-level reverse proxy (outside
    # Docker), not here — see frontend/nginx.conf header comment.

volumes:
  postgres_data:
