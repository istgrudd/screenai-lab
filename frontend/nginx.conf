# ScreenAI Lab — in-container nginx config
#
# TLS is NOT terminated here. The VPS-level reverse proxy (Nginx or Caddy
# running on the host, outside Docker) handles HTTPS and forwards plain HTTP
# to this container's port 80 — see the deployment checklist step 11 in
# docs/ISSUES_AND_NOTES.md / docs/reports/RAILWAY_VERCEL_CLEANUP_REPORT.md.
#
# This file handles two concerns only:
#   1. Serve the built React SPA from /usr/share/nginx/html.
#   2. Reverse-proxy /api/ to the FastAPI backend on the compose network.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed Vite assets (filenames include a content hash).
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API requests go to the backend container by its compose service name.
    # `backend` resolves over the compose-managed Docker network.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streamy uploads / longer-running evaluation batch requests:
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 25m;
    }

    # SPA fallback — every non-asset, non-/api/ request returns index.html
    # so React Router can take over client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
